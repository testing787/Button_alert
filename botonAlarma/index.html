<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Seguridad Ciudadana</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003366">
</head>

<body class="d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                <div class="card card-registro p-4 mx-auto">

                    <div class="text-center mb-4">
                        <h2 class="h4 fw-bold text-dark">Registro de Usuario</h2>
                        <p class="text-muted small">Valida tu identidad para habilitar el botón de alerta remota.</p>
                    </div>

                    <!-- SECCIÓN 1: Ingreso de Teléfono -->
                    <div id="seccion-telefono">
                        <div class="mb-3">
                            <label for="txt-nombre" class="form-label small fw-bold">Nombre Completo / Alias</label>
                            <input type="text" id="txt-nombre" class="form-control" placeholder="Ej. Juan Pérez">
                        </div>
                        <div class="mb-3">
                            <label for="txt-telefono" class="form-label small fw-bold">Número Celular (10
                                dígitos)</label>
                            <div class="input-group">
                                <span class="input-group-text">+52</span>
                                <input type="tel" id="txt-telefono" class="form-control" placeholder="2281234567">
                            </div>
                        </div>
                        <!-- Contenedor obligatorio para el reCAPTCHA invisible de Firebase -->
                        <div id="recaptcha-container" class="mb-3"></div>

                        <button class="btn btn-institucional w-100 py-2" id="btn-enviar-sms">Enviar Código por
                            SMS</button>
                    </div>

                    <!-- SECCIÓN 2: Verificación de Código (Oculta por defecto) -->
                    <div id="seccion-codigo" class="d-none">
                        <div class="alert alert-info small" role="alert">
                            Hemos enviado un código de 6 dígitos a tu celular. Frecuentemente tarda un par de segundos
                            en llegar.
                        </div>
                        <div class="mb-3">
                            <label for="txt-codigo" class="form-label small fw-bold">Código de Verificación</label>
                            <input type="text" id="txt-codigo" class="form-control text-center fs-4"
                                placeholder="000000" maxlength="6">
                        </div>
                        <button class="btn btn-success w-100 py-2" id="btn-verificar-codigo">Verificar y
                            Registrar</button>
                        <button class="btn btn-link w-100 text-muted small mt-2" id="btn-regresar">Modificar
                            número</button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
