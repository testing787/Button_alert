<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Monitoreo - Alertas en Tiempo Real</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="/js/guardian.js"></script>
    <style>
        body {
            display: none;
            background-color: #f4f6f9;
            font-family: sans-serif;
        }

        .navbar-institucional {
            background-color: #003366;
            color: white;
        }

        .tarjeta-metrica {
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .alerta-parpadeo {
            animation: parpadeoRojo 1.5s infinite;
            background-color: #f8d7da !important;
        }

        @keyframes parpadeoRojo {
            0% {
                box-shadow: inset 0 0 10px rgba(220, 53, 69, 0.2);
            }

            50% {
                box-shadow: inset 0 0 20px rgba(220, 53, 69, 0.6);
            }

            100% {
                box-shadow: inset 0 0 10px rgba(220, 53, 69, 0.2);
            }
        }
    </style>
</head>

<body>
  
    <nav class="navbar navbar-institucional mb-4 shadow-sm">
        <div class="container-fluid px-4">
            <span class="navbar-brand mb-0 h1 text-white fw-bold">
                <i class="bi bi-shield-exclamation text-warning me-2"></i>Módulo de Recepción de Emergencias
            </span>

            <div class="d-flex align-items-center gap-3">
                <span class="text-white-50 small d-none d-sm-inline" id="usuario-operador">
                    <i class="bi bi-person-circle me-1"></i> Cargando operador...
                </span>
                <span class="badge bg-danger p-2 me-2" id="indicador-conexion">Conectado al Servidor</span>
                <button class="btn btn-outline-light btn-sm fw-bold" onclick="cerrarSesion_UI()">
                    <i class="bi bi-box-arrow-right me-1"></i> Salir
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row mb-4">
            <div class="col-12 col-md-4">
                <div class="card tarjeta-metrica p-3 text-center bg-white">
                    <h3 class="text-muted small fw-bold text-uppercase mb-1">Alertas Activas</h3>
                    <span class="display-6 fw-bold text-danger" id="num-alertas">0</span>
                </div>
            </div>
        </div>

        <div class="card tarjeta-metrica bg-white p-4">
            <h2 class="h5 fw-bold mb-3 text-dark">Incidentes en Proceso</h2>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha / Hora del Reporte</th>
                            <th>Teléfono Ciudadano</th>
                            <th style="min-width: 150px;">Ubicación Mapa</th>
                            <th>Estatus</th>
                            <th class="text-end px-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-alertas">
                        <tr id="fila-vacia">
                            <td colspan="5" class="text-center text-muted py-4">
                                <i class="bi bi-check-circle text-success me-2"></i>No hay alertas activas en este
                                momento.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <audio id="sonido-alarma" src="https://storage.googleapis.com/codeskulptor-demos/pysge/audio_ext.ogg" preload="auto"
        loop></audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/panel.js"></script>
</body>

</html>
