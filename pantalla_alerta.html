<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Asistencia Ciudadana</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003366">
    <link rel="stylesheet" href="./style.css">


</head>

<body>

    <div class="container contenedor-central px-4 mx-auto text-center">

        <!-- Encabezado discreto (Evita usar palabras llamativas como "PÁNICO" en letras gigantes) -->
        <div class="mb-5" id="cabecera-alerta">
            <h1 class="h5 fw-bold text-secondary">Módulo de Asistencia Digital</h1>
            <p class="text-muted small px-3">En caso de emergencia, mantén presionado el centro de la pantalla hasta
                completar la barra inferior.</p>
        </div>

        <!-- El Botón de Activación -->
        <button id="btn-alerta" class="btn-panico d-flex align-items-center justify-content-center">
            Asistencia
        </button>

        <!-- Barra de progreso de pulsación -->
        <div class="progreso-contenedor">
            <div id="barra" class="barra-progreso"></div>
        </div>

        <!-- Estado del envío en tiempo real -->
        <div id="txt-estado" class="mt-4 small fw-bold text-muted">Sistema enlazado y listo</div>

    </div>
    <div class="contenedor-acciones" style="margin: 20px;">
        <button id="btn-cerrar-sesion" class="btn btn-outline-danger">Salir</button>
    </div>
    <!-- Carga de la lógica interna -->
    <script type="module" src="/js/alerta.js"></script>
</body>

</html>
